<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reasonix Code 用户指南</title>
  <meta name="description" content="Reasonix Code — 精确、严谨、可审计的 AI 编程助手使用指南">
  <!-- docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-copy-code@latest/dist/docsify-copy-code.min.css">
</head>
<body>
  <div id="app">正在加载文档…</div>
  <script>
    window.$docsify = {
      name: 'Reasonix Code',
      repo: 'maxwell9421/reasonix-guide',
      loadSidebar: false,
      auto2top: true,
      coverpage: false,
      basePath: 'docs/',
      search: 'auto',
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            return content
              .replace(/```reasonix/g, '```')
              .replace(/\[exit \d+\]/g, '')
          })
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@latest/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-search@latest/dist/docsify-search.min.js"></script>
</body>
</html>
